name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sigmatic
          POSTGRES_PASSWORD: sigmatic
          POSTGRES_DB: sigmatic_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Lint
        run: ruff check sigmatic/

      - name: Type Check
        run: mypy sigmatic/ --ignore-missing-imports

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://sigmatic:sigmatic@localhost:5432/sigmatic_test
          DATABASE_URL_SYNC: postgresql://sigmatic:sigmatic@localhost:5432/sigmatic_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest tests/ -v
